logLevel: info

# Copie para cameras.yml e preencha USUARIO/SENHA (o @ da senha vira %40).
# Versão local (LAN): WebRTC + main stream (subtype=0) em HD.
# Notebook fraco travando? troque subtype=0 por subtype=1 (substream, bem mais leve).

rtsp: no
rtmp: no
srt: no
hls: no
api: no
metrics: no
pprof: no
playback: no

webrtc: yes
webrtcAddress: :8889
webrtcAllowOrigins: ['*']

paths:
  cam1:
    source: rtsp://USUARIO:SENHA@192.168.15.3:554/cam/realmonitor?channel=1&subtype=0
    rtspTransport: tcp
  cam2:
    source: rtsp://USUARIO:SENHA@192.168.15.4:554/cam/realmonitor?channel=1&subtype=0
    rtspTransport: tcp
  cam3:
    source: rtsp://USUARIO:SENHA@192.168.15.5:554/cam/realmonitor?channel=1&subtype=0
    rtspTransport: tcp
  cam4:
    source: rtsp://USUARIO:SENHA@192.168.15.6:554/cam/realmonitor?channel=1&subtype=0
    rtspTransport: tcp
